<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ML Compras — Autorização</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; color: #222; margin: 0 0 8px; }
    p  { color: #666; font-size: 14px; margin: 0 0 24px; }

    .code-box {
      background: #f0f4ff;
      border: 2px solid #2968c8;
      border-radius: 10px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: #1a3a6e;
      text-align: left;
      margin-bottom: 16px;
    }
    .btn-copy {
      background: #2968c8;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .2s;
    }
    .btn-copy:hover { background: #1a52a8; }
    .btn-copy.copied { background: #00a650; }

    .error {
      background: #fff0f0;
      border: 2px solid #f44;
      border-radius: 10px;
      padding: 16px;
      color: #c00;
      font-size: 14px;
    }
    .step {
      background: #fffbea;
      border: 1px solid #ffd700;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #7a5c00;
      margin-top: 16px;
      text-align: left;
    }
    .step strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛒</div>
  <h1>ML Compras Dashboard</h1>
  <p id="subtitle">Processando autorização...</p>

  <div id="content"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');
  const content = document.getElementById('content');
  const subtitle = document.getElementById('subtitle');

  if (error) {
    subtitle.textContent = 'Erro na autorização';
    content.innerHTML = `<div class="error">❌ ${error}: ${params.get('error_description') || 'Tente novamente.'}</div>`;

  } else if (code) {
    subtitle.textContent = 'Autorização concluída! Copie o código abaixo.';
    content.innerHTML = `
      <div class="code-box" id="code-display">${code}</div>
      <button class="btn-copy" id="btn" onclick="copyCode()">📋 Copiar código</button>
      <div class="step">
        <strong>Próximo passo:</strong>
        Volte ao dashboard em <strong>http://localhost:5000</strong>,
        cole este código no campo indicado e clique em "Conectar".
      </div>`;

  } else {
    subtitle.textContent = 'Nenhum código encontrado.';
    content.innerHTML = `<div class="error">Nenhum código de autorização foi recebido. Certifique-se de acessar esta página pelo fluxo de login do dashboard.</div>`;
  }

  function copyCode() {
    const code = document.getElementById('code-display').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('btn');
      btn.textContent = '✅ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copiar código';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
